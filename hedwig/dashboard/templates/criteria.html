{% extends "base.html" %}
{% block title %}Hedwig — Criteria{% endblock %}
{% block content %}

<div class="hero">
  <h1>📜 Criteria Editor</h1>
  <p class="subtitle">Your filtering criteria (auto-generated by Socratic onboarding, auto-evolved by the engine).</p>
</div>

<form hx-post="/criteria/save" hx-swap="none" onsubmit="showToast('✅ Criteria saved')">
  <textarea name="content" class="criteria-editor" rows="30">{{ content }}</textarea>
  <div class="button-row">
    <button type="submit" class="btn btn-primary">💾 Save</button>
    <a href="/onboarding" class="btn">🎙️ Re-run Onboarding</a>
  </div>
</form>

<div id="toast" class="toast"></div>
<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

{% endblock %}
