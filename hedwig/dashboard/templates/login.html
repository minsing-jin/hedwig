{% extends "base.html" %}
{% block title %}Hedwig — Sign In{% endblock %}
{% block content %}

<div class="auth-container">
  <div class="auth-card">
    <h1>🦉 Welcome Back</h1>

    <form id="login-form" class="form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-large">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>No account? <a href="/signup" class="link">Sign up</a></p>
    </div>

    <div id="error" class="alert" style="display:none"></div>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  const formData = new FormData(e.target);
  const resp = await fetch('/auth/login', { method: 'POST', body: formData });
  const data = await resp.json();

  if (resp.ok) {
    window.location.href = '/';
  } else {
    errorEl.textContent = '❌ ' + (data.detail || data.error || 'Login failed');
    errorEl.style.display = 'block';
  }
});
</script>

{% endblock %}
