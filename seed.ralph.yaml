goal: >
  Build new features for Hedwig v3.0 SaaS. The foundation is complete
  (17 sources including GitHub Trending, evolution engine, dashboard,
  SaaS auth, billing). This iteration adds real user-facing features
  that make Hedwig immediately useful. Codex implements each feature;
  a fresh Codex instance reviews independently.

constraints:
  - Preserve all existing code — do not break the 277+ passing tests
  - "Tests must pass with pytest tests/ -v"
  - Follow existing code style (Pydantic, async, type hints)
  - Each AC produces a working feature with at least 1 test
  - Do not modify seed.yaml or docs/interviews/ content
  - Work directly on main branch (Claude Code authorized)

acceptance_criteria:
  - Build a /signals/export endpoint that returns the last 100 signals as a JSON download file with Content-Disposition header
  - Build a /signals/search endpoint that accepts a query parameter q and returns matching signals by searching title+content fields
  - Build email notification support — when an alert-level signal arrives send email via SMTP (configurable via SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM env vars)
  - Build a /dashboard/stats endpoint returning JSON with total_signals, upvote_ratio, evolution_cycles, top_5_sources, and days_active
  - Build a test for github_trending source plugin that verifies it registers with correct metadata and _is_ai_related returns True for AI repos and False for non-AI repos
  - Build YouTube transcript enrichment — after collecting YouTube posts use yt-dlp subprocess to fetch video transcript and append to post.content for better LLM scoring
  - Add a /settings page in dashboard where users can toggle source plugins on or off and save to a local config file
  - Add a /health endpoint returning JSON with last_daily_run, last_weekly_run, evolution_cycle_count, source_count, and uptime_seconds
  - Build cross-platform signal deduplication — before saving check if same URL exists across sources and skip duplicates
  - All 277+ existing tests still pass with zero regressions after all features added

ontology_schema:
  name: HedwigFeatureIteration
  description: New feature implementation for Hedwig v3.0
  fields:
    - name: endpoint
      type: object
      description: A new FastAPI route with method and path and response schema
    - name: source_enhancement
      type: object
      description: An improvement to an existing source plugin
    - name: system_feature
      type: object
      description: A backend feature like dedup or notifications or health checks

evaluation_principles:
  - name: feature_completeness
    description: Each feature works end-to-end not just a stub
    weight: 0.35
  - name: test_coverage
    description: Each feature has at least one test
    weight: 0.25
  - name: zero_regression
    description: All 277+ existing tests still pass
    weight: 0.25
  - name: code_quality
    description: Clean code and proper error handling following project patterns
    weight: 0.15

exit_conditions:
  - name: all_features_work
    description: All 10 ACs implemented and tested
    criteria: pytest tests/ exits with 0 and all new endpoints return expected responses
  - name: no_regression
    description: Existing 277+ tests still pass
    criteria: pytest tests/ shows at least 277 passed

metadata:
  version: "3.0.0"
  project_name: "hedwig-feature-iteration"
  purpose: "Build real user-facing features via Codex orchestrator"
