goal: >
  Verify Hedwig v3.0 zero-config SaaS is production-ready end-to-end.
  All foundations are built (saas, native, dashboard, auto-context, oauth,
  operator keys, billing, invite, multilingual, legal pages, deployment files).
  This Ralph loop must verify each component, write missing tests, fix any
  integration gaps, and ensure the complete user journey works:
  Visit landing → OAuth signin → Auto onboarding → First signals → Vote →
  Evolve → Upgrade to Pro → Invite friend.

constraints:
  - Preserve all existing code in hedwig/ directory
  - Do not remove or rename existing modules
  - All changes must pass Python import check
  - New tests go in tests/ directory, follow pytest conventions
  - Follow existing code style (Pydantic, async, type hints)
  - Do not add new external dependencies without updating pyproject.toml
  - Do not modify seed.yaml content
  - Commit each verified fix as a separate git commit
  - Tests must pass with: pytest tests/ -v
  - Dashboard SaaS mode must serve all routes successfully

acceptance_criteria:
  - Test exists for hedwig.saas.auto_context module imports
  - Test exists that AutoContextInference fallback returns valid criteria
  - Test exists for hedwig.saas.oauth module — verify 12 providers registered
  - Test exists that build_oauth_url returns None when SUPABASE_URL missing
  - Test exists for hedwig.saas.operator_keys module — quotas defined for all tiers
  - Test exists that get_operator_openai_key raises clear error when missing
  - Dashboard SaaS mode serves /billing route HTTP 200
  - Dashboard SaaS mode serves /invite route HTTP 200
  - Dashboard SaaS mode serves /ko (Korean landing) HTTP 200
  - Dashboard SaaS mode serves /zh (Chinese landing) HTTP 200
  - Dashboard SaaS mode serves /terms HTTP 200
  - Dashboard SaaS mode serves /privacy HTTP 200
  - Dashboard SaaS mode serves /about HTTP 200
  - Procfile exists for Railway deployment
  - Dockerfile exists with valid syntax
  - railway.toml exists with healthcheck path
  - nixpacks.toml exists for Railway nixpacks builder
  - .dockerignore exists excluding .venv and tests
  - docs/HOSTING.md exists with deployment instructions
  - Signup template contains 12 OAuth provider buttons
  - Auto-onboarding template contains at least 10 SNS handle inputs
  - Billing template references all three tiers (free, pro, team)
  - All previous v3.0 ACs still pass (no regressions)

ontology_schema:
  name: HedwigV3FullVerification
  description: Domain model for verifying complete Hedwig v3.0 SaaS readiness
  fields:
    - name: route
      type: object
      description: HTTP route with method, path, expected status, and template
    - name: oauth_provider
      type: object
      description: OAuth provider registration with id, label, color
    - name: deployment_artifact
      type: object
      description: Deployment file (Dockerfile, Procfile, railway.toml) with valid syntax
    - name: legal_page
      type: object
      description: Required legal page (terms, privacy, about) with required sections
    - name: integration_test
      type: object
      description: Pytest file verifying cross-module behavior

evaluation_principles:
  - name: zero_regression
    description: All previously-passing tests still pass
    weight: 0.30
  - name: full_route_coverage
    description: Every dashboard route returns expected status
    weight: 0.25
  - name: deployment_readiness
    description: Hedwig can be deployed to Railway/Docker without manual edits
    weight: 0.20
  - name: oauth_completeness
    description: All 12 OAuth providers register correctly
    weight: 0.15
  - name: documentation_accuracy
    description: README and HOSTING docs match actual capabilities
    weight: 0.10

exit_conditions:
  - name: all_tests_pass
    description: pytest tests/ exits with code 0
    criteria: All test files green
  - name: all_routes_serve
    description: SaaS mode serves all 16+ routes
    criteria: HTTP 200 or expected redirect for every route
  - name: deployment_ready
    description: Procfile, Dockerfile, railway.toml, nixpacks.toml all valid
    criteria: docker build succeeds, railway.toml parses

metadata:
  version: "2.0.0"
  project_name: "hedwig-ralph-v3-full"
  purpose: "End-to-end verification of Hedwig v3.0 zero-config SaaS"
